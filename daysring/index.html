  :root {
    --bg: #f8f9fb;

    :root {

      --text: #f5f5f7;
      --muted: #98989d;
      --accent: #5b9bf5;
      --border: #2c2c2e;

    color: var(--text);
    line-height: 1.7;
    -webkit-font-smoothing: antialiased;
  }

  .container {
    max-width: 680px;
    margin: 0 auto;
    padding: 40px 20px 80px;
  }

  .header {
    text-align: center;
    margin-bottom: 32px;
  }
  .header .icon {
    width: 56px; height: 56px;
    background: linear-gradient(135deg, #6366f1, #2563eb);
    border-radius: 14px;
    display: inline-flex; align-items: center; justify-content: center;
    margin-bottom: 12px;
    color: #fff; font-size: 28px;
  }
  .header h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.02em;
  }
  .header .update {
    font-size: 13px;
    color: var(--muted);
    margin-top: 4px;
  }

  .lang-bar {
    display: flex;
    justify-content: center;
    gap: 4px;
    margin-bottom: 32px;
    flex-wrap: wrap;
  }
  .lang-bar button {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 14px;
    font-size: 13px;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
  }
  .lang-bar button:hover { border-color: var(--accent); color: var(--accent); }
  .lang-bar button.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  .tab-bar {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--border);
    margin-bottom: 28px;
  }
  .tab-bar button {
    flex: 1;
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    padding: 10px 0;
    font-size: 14px;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
  }
  .tab-bar button:hover { color: var(--text); }
  .tab-bar button.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  .content-section { display: none; }
  .content-section.active { display: block; }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px 24px;
  }

  .card h2 {
    font-size: 17px;
    font-weight: 700;
    margin-bottom: 16px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }

  .card h3 {
    font-size: 15px;
    font-weight: 700;
    margin: 20px 0 8px;
    color: var(--accent);
  }

  .card p {
    font-size: 14px;
    color: var(--text);
    margin-bottom: 12px;
  }

  .card p:last-child { margin-bottom: 0; }

  .contact {
    margin-top: 24px;
    padding: 16px;
    background: var(--bg);
    border-radius: 8px;
    font-size: 13px;
    color: var(--muted);
  }
  .contact a {
    color: var(--accent);
    text-decoration: none;
  }

  .footer {
    text-align: center;
    margin-top: 48px;
    font-size: 12px;
    color: var(--muted);
  }
</style>
</head>

function render() {
  var d = DATA[currentLang];

  var langBar = document.getElementById("langBar");
  langBar.innerHTML = "";
  var codes = Object.keys(DATA);
  for (var i = 0; i < codes.length; i++) {
    var code = codes[i];
    var btn = document.createElement("button");
    btn.textContent = DATA[code].label;
    btn.className = code === currentLang ? "active" : "";
    btn.setAttribute("data-lang", code);
    btn.onclick = function() { currentLang = this.getAttribute("data-lang"); render(); };
    langBar.appendChild(btn);
  }

  var tabBar = document.getElementById("tabBar");
  tabBar.innerHTML = "";
  for (var t = 0; t < d.tabs.length; t++) {
    var tbtn = document.createElement("button");
    tbtn.textContent = d.tabs[t];
    tbtn.className = t === currentTab ? "active" : "";
    tbtn.setAttribute("data-tab", t);
    tbtn.onclick = function() { currentTab = parseInt(this.getAttribute("data-tab")); render(); };
    tabBar.appendChild(tbtn);
  }

  var data = currentTab === 0 ? d.privacy : d.terms;
  var html = '<div class="card">';
  html += '<h2>' + data.title + '</h2>';
  for (var s = 0; s < data.sections.length; s++) {
    html += '<h3>' + data.sections[s].heading + '</h3>';

  }
  html += '<div class="contact"><strong>' + d.contact + ':</strong> <a href="mailto:' + CONTACT_EMAIL + '">' + CONTACT_EMAIL + '</a></div>';
  html += '</div>';
  document.getElementById("contentArea").innerHTML = html;
}

function detectLang() {
  var lang = navigator.language || "ja";
  if (lang.indexOf("zh") === 0) return "zh-Hans";
  if (lang.indexOf("fr") === 0) return "fr";
  if (lang.indexOf("es") === 0) return "es";
  if (lang.indexOf("en") === 0) return "en";
  return "ja";
}

currentLang = detectLang();
